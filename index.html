<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI Agent System</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: white;
    text-align: center;
    padding: 40px;
}

.container {
    max-width: 900px;
    margin: auto;
}

h1 {
    font-size: 2.5rem;
    margin-bottom: 20px;
}

.input-box {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin-bottom: 20px;
}

input {
    padding: 12px;
    width: 60%;
    border-radius: 10px;
    border: none;
    font-size: 16px;
    outline: none;
}

input:focus {
    box-shadow: 0 0 8px #22c55e;
}

button {
    padding: 12px 20px;
    border: none;
    border-radius: 10px;
    background: #22c55e;
    color: black;
    font-weight: bold;
    cursor: pointer;
    transition: 0.2s;
}

button:hover {
    background: #16a34a;
}

.card {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    padding: 20px;
    border-radius: 15px;
    margin-top: 20px;
    text-align: left;
    min-height: 100px;
}

.loading {
    color: #22c55e;
    font-weight: bold;
}

pre {
    white-space: pre-wrap;
    word-wrap: break-word;
}
</style>
</head>

<body>

<div class="container">
    <h1>Debate-Driven AI</h1>

    <div class="input-box">
        <input id="inputText" placeholder="Enter problem...">
        <button onclick="runAgent()">Run</button>
    </div>

    <div id="output" class="card">Result will appear here...</div>

    <canvas id="chart" style="margin-top:30px;"></canvas>
</div>

<script>
let chartInstance = null;

async function runAgent() {
    const input = document.getElementById("inputText").value;
    const output = document.getElementById("output");

    if (!input) {
        output.innerHTML = "<span style='color:red;'>Please enter input</span>";
        return;
    }

    output.innerHTML = "<div class='loading'>Processing...</div>";

    try {
        const res = await fetch("http://127.0.0.1:8000/run", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ input_text: input })
        });

        const data = await res.json();

        output.innerHTML = `<pre>${JSON.stringify(data, null, 2)}</pre>`;

        renderChart(data);

    } catch (err) {
        output.innerHTML = "<span style='color:red;'>Error connecting to backend</span>";
    }
}

function renderChart(data) {
    const ctx = document.getElementById("chart");

    if (chartInstance) {
        chartInstance.destroy();
    }

    const roi = parseInt(data.expected_impact?.roi || 0);
    const confidence = data.confidence_score || 0;

    chartInstance = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: ['ROI %', 'Confidence'],
            datasets: [{
                label: 'Performance',
                data: [roi, confidence]
            }]
        },
        options: {
            scales: {
                y: {
                    beginAtZero: true
                }
            }
        }
    });
}
</script>

</body>
</html>
